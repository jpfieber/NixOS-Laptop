# This file will be encrypted with sops
# After setting up age keys, edit with: sops secrets/rclone.conf
# Paste your actual rclone.conf content here and it will be encrypted

# Instructions:
# 1. Do a rebuild first to install sops and age
# 2. Generate age key from host SSH key:
#    sudo mkdir -p /var/lib/sops-nix
#    sudo ssh-to-age -private-key -i /etc/ssh/ssh_host_ed25519_key -o /var/lib/sops-nix/key.txt
# 3. Get the public key:
#    ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
# 4. Copy .sops.yaml.template to .sops.yaml and replace YOUR_AGE_PUBLIC_KEY_HERE with the output from step 3
# 5. Edit and encrypt this file:
#    sops secrets/rclone.conf
# 6. Delete or move your old unencrypted rclone.conf
# 7. Rebuild to deploy the encrypted secret
